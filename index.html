<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacob Noon – Trainer, Coach, Mediator</title>
  <meta name="description" content="Jacob Noon: Trainer, Coach und Mediator für Konflikt, Verhandlung und Führungskommunikation. Berlin-basiert, international aktiv.">
  <link rel="canonical" href="https://jacobnoon.com/de/">
  <link rel="alternate" hreflang="de" href="https://jacobnoon.com/de/">
  <link rel="alternate" hreflang="en" href="https://jacobnoon.com/en/">
  <link rel="alternate" hreflang="x-default" href="https://jacobnoon.com/de/">
  <meta name="robots" content="noindex, follow">
  <meta http-equiv="refresh" content="0; url=/de/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,'DM Sans',sans-serif;background:#111114;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;line-height:1.5}
    .wrap{text-align:center;max-width:420px}
    h1{font-size:1.4rem;font-weight:600;margin:0 0 0.6rem}
    p{color:rgba(255,255,255,0.65);margin:0 0 1.5rem;font-size:0.95rem}
    a{display:inline-block;padding:0.65rem 1.4rem;background:#4CC265;color:#fff;text-decoration:none;border-radius:3px;font-weight:600;letter-spacing:0.03em;margin:0 0.3rem}
    a.alt{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff}
    a:hover{opacity:0.85}
    .pulse{display:inline-block;width:10px;height:10px;border-radius:50%;background:#4CC265;margin-right:0.5rem;vertical-align:middle;animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
  </style>
  <script>
    // Detect browser language: German speakers go to /de/, everyone else to /en/.
    // Netlify country-based redirect handles the IP-level routing; this is a fallback.
    (function() {
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      var target = lang.indexOf('de') === 0 ? '/de/' : '/en/';
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <h1><span class="pulse"></span>Jacob Noon</h1>
    <p>Weiterleitung… / Redirecting…</p>
    <a href="/de/">Auf Deutsch</a>
    <a href="/en/" class="alt">In English</a>
  </div>
</body>
</html>
